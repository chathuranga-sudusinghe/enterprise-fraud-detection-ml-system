name: ML System CI Pipeline

# Trigger pipeline on push or pull request to main and dev branches
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:

      # Checkout repository code
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Keep this job present for branch protection, but skip heavy work
      # when a pull request changes only documentation files.
      - name: Determine CI scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run_heavy=true" >> "$GITHUB_OUTPUT"
            echo "reason=push to protected branch runs full CI" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --prune origin "${{ github.base_ref }}"
          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"

          if [ -z "$changed_files" ]; then
            echo "run_heavy=true" >> "$GITHUB_OUTPUT"
            echo "reason=no changed files detected; running full CI safely" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files:"
          echo "$changed_files"

          run_heavy=false

          while IFS= read -r file; do
            case "$file" in
              api/*|ml/*|tests/*|scripts/*|lakehouse/*|orchestration/*|terraform/*|docker/*|Dockerfile|docker-compose.yml|requirements*.txt|pytest.ini|.github/workflows/*)
                run_heavy=true
                ;;
              README.md|*.md|docs/*)
                ;;
              *)
                run_heavy=true
                ;;
            esac
          done <<< "$changed_files"

          if [ "$run_heavy" = "true" ]; then
            echo "run_heavy=true" >> "$GITHUB_OUTPUT"
            echo "reason=code-impacting or unclassified files changed" >> "$GITHUB_OUTPUT"
          else
            echo "run_heavy=false" >> "$GITHUB_OUTPUT"
            echo "reason=documentation-only pull request" >> "$GITHUB_OUTPUT"
          fi

      - name: Report CI scope
        run: |
          echo "Heavy CI enabled: ${{ steps.scope.outputs.run_heavy }}"
          echo "Reason: ${{ steps.scope.outputs.reason }}"

      - name: Skip heavy CI for documentation-only PR
        if: steps.scope.outputs.run_heavy == 'false'
        run: |
          echo "Documentation-only pull request detected."
          echo "Skipping dependency install, tests, and Docker build."

      # Setup Python environment
      - name: Setup Python
        if: steps.scope.outputs.run_heavy == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install project dependencies
      - name: Install dependencies
        if: steps.scope.outputs.run_heavy == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run unit tests
      - name: Run tests
        if: steps.scope.outputs.run_heavy == 'true'
        run: |
          export PYTHONPATH=$(pwd)
          python -m pytest tests/

      # Build Docker image
      - name: Build docker
        if: steps.scope.outputs.run_heavy == 'true'
        run: |
          docker build -t enterprise-ml-system -f docker/Dockerfile .
